name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # Node is preinstalled on ubuntu-latest, so the Python↔JS parity test runs here too.
      - run: uv sync
      - run: uv run python -m unittest discover -s tests -t . -v
